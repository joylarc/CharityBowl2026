name: Daily transaction export

on:
  schedule:
    - cron: "0 19 * * *"  # 3 PM ET (7 PM UTC) daily during event week
  workflow_dispatch: {}  # Manual trigger for testing

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch donation data from GiveSmart
        env:
          GIVESMART_API_TOKEN: ${{ secrets.GIVESMART_API_TOKEN }}
          GIVESMART_CAMPAIGN: ${{ vars.GIVESMART_CAMPAIGN || 'Charity Bowl 2026' }}
        run: python scripts/fetch_givesmart.py

      - name: Rename with timestamp
        run: |
          TIMESTAMP=$(date -u +"%Y-%m-%d-%H%M")
          mv transactions.csv "transactions_${TIMESTAMP}.csv"
          echo "FILENAME=transactions_${TIMESTAMP}.csv" >> $GITHUB_ENV

      - name: Upload transactions as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.FILENAME }}
          path: ${{ env.FILENAME }}
          retention-days: 30
