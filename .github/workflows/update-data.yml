name: Update Donation Data

on:
  # schedule:
  #   - cron: "*/15 * * * *"  # Every 15 minutes — uncomment when campaign is live
  workflow_dispatch: {}  # Manual trigger only for now

concurrency:
  group: "deploy"
  cancel-in-progress: true

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch donation data from GiveSmart
        env:
          GIVESMART_API_TOKEN: ${{ secrets.GIVESMART_API_TOKEN }}
          GIVESMART_CAMPAIGN: ${{ vars.GIVESMART_CAMPAIGN || 'Charity Bowl 2025' }}
        run: python scripts/fetch_givesmart.py

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: ".node-version"
          cache: "yarn"

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build site
        run: yarn build

      - name: Prepare edsbscharitybowl dist
        run: |
          cp -r dist dist-edsbs
          cp dist-edsbs/testreplacement.html dist-edsbs/index.html

      - name: Deploy moneycannon to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=2026moneycannon

      - name: Deploy edsbscharitybowl to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist-edsbs --project-name=2026edsbs
