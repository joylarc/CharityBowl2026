name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main
  # schedule:
  #   - cron: "*/15 * * * *"  # Every 15 minutes — uncomment when campaign is live
  workflow_dispatch:
    inputs:
      fetch_data:
        description: "Fetch fresh data from GiveSmart API"
        type: boolean
        default: false

concurrency:
  group: "deploy"
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        if: ${{ github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.fetch_data) }}
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch donation data from GiveSmart
        if: ${{ github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.fetch_data) }}
        env:
          GIVESMART_API_TOKEN: ${{ secrets.GIVESMART_API_TOKEN }}
          GIVESMART_CAMPAIGN: ${{ vars.GIVESMART_CAMPAIGN || 'Charity Bowl 2025' }}
        run: python scripts/fetch_givesmart.py --error-log fetch-errors.txt

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: ".node-version"
          cache: "yarn"

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build site
        run: yarn build

      - name: Prepare edsbscharitybowl dist
        run: |
          cp -r dist dist-edsbs
          cp dist-edsbs/testreplacement.html dist-edsbs/index.html

      - name: Deploy moneycannon to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=2026moneycannon

      - name: Deploy edsbscharitybowl to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist-edsbs --project-name=2026edsbs

      - name: Check for data errors
        if: ${{ github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.fetch_data) }}
        run: |
          if [ -s fetch-errors.txt ]; then
            echo "::error::Some donation rows had invalid data and were skipped"
            cat fetch-errors.txt
            exit 1
          fi
