name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

concurrency:
  group: "deploy"
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch donation data from GiveSmart
        if: ${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}
        env:
          GIVESMART_API_TOKEN: ${{ secrets.GIVESMART_API_TOKEN }}
          GIVESMART_CAMPAIGN: ${{ vars.GIVESMART_CAMPAIGN || 'Charity Bowl 2026' }}
        run: python scripts/fetch_givesmart.py --error-log fetch-errors.txt

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: ".node-version"
          cache: "yarn"

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build site
        run: yarn build

      - name: Prepare site distributions
        run: |
          # Build edsbs dist first (before removing files from dist)
          mkdir dist-edsbs
          cp -r dist/assets dist-edsbs/
          cp dist/testreplacement.html dist-edsbs/index.html
          cp dist/faq.html dist-edsbs/
          cp dist/2025impactreport.pdf dist-edsbs/
          cp dist/donations.csv dist-edsbs/
          cp dist/stats.json dist-edsbs/
          cp dist/helmet.svg dist-edsbs/
          cp dist/logo.png dist-edsbs/
          cp dist/nap-logo-white.png dist-edsbs/
          cp dist/SpencerOveralls.jpg dist-edsbs/
          cp dist/og-image.png dist-edsbs/
          # Clean moneycannon dist (remove edsbs-only pages)
          rm -f dist/testreplacement.html
          rm -f dist/faq.html

      - name: Deploy moneycannon to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=2026moneycannon

      - name: Deploy edsbscharitybowl to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist-edsbs --project-name=2026edsbs

      - name: Commit fresh data back to repo
        if: ${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add donations.csv stats.json
          git diff --staged --quiet || git commit -m "Update donations data [skip ci]" && git push

      - name: Check for data errors
        if: ${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}
        run: |
          if [ -s fetch-errors.txt ]; then
            echo "::error::Some donation rows had invalid data and were skipped"
            cat fetch-errors.txt
            exit 1
          fi
